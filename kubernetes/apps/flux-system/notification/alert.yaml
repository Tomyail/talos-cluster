---
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Alert
metadata:
  name: github-status
  namespace: flux-system
spec:
  providerRef:
    name: github
  eventSeverity: info
  eventSources:
    - kind: Kustomization
      name: "fava"
      namespace: "default"
    - kind: Kustomization
      name: "x-likes"
      namespace: "default"
    - kind: Kustomization
      name: "yt-audio"
      namespace: "default"
    - kind: Kustomization
      name: "notification"
      namespace: "flux-system"
  summary: "Flux reconciliation: {{ .Kind }}/{{ .Name }} in {{ .Namespace }}"
