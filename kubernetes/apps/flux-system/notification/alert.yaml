---
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Alert
metadata:
  name: github-status
  namespace: flux-system
spec:
  providerRef:
    name: github
  eventSeverity: info
  eventSources:
    - kind: Kustomization
      name: "*"
      namespace: "*"
  summary: "Flux reconciliation: {{ .Kind }}/{{ .Name }} in {{ .Namespace }}"
