---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: volsync-snapshot-cleanup
  namespace: storage
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: volsync-snapshot-cleanup
rules:
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: volsync-snapshot-cleanup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: volsync-snapshot-cleanup
subjects:
  - kind: ServiceAccount
    name: volsync-snapshot-cleanup
    namespace: storage
