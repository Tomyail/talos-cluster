---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app x-likes
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      x-likes:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: gitea.tomyail.com/tomyail/x-likes
              tag: latest
            env:
              TZ: ${TIMEZONE}
              PORT: &port 4098
              FETCH_MODE: workflow
              FETCH_USERNAME: tomyail
              FETCH_CDP_URL: http://webtop.default.svc.cluster.local:9223/json/version
              FETCH_MAX_SCROLLS: "5"
              FETCH_FORCE_DETAILS: "false"
              SCHEDULE_INTERVAL_MINUTES: "60"
              SCHEDULE_RUN_ON_START: "true"
              STORAGE_MODE: dual
              DATA_DIR: /data
              S3_BUCKET: x-likes
              S3_REGION: us-east-1
              S3_ENDPOINT: https://cold-minio-api.${SECRET_DOMAIN}
              S3_PREFIX: users/tomyail
              S3_FORCE_PATH_STYLE: "true"
            envFrom:
              - secretRef:
                  name: x-likes-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 30
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
    defaultPodOptions:
      imagePullSecrets:
        - name: gitea-registry-secret
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    persistence:
      data:
        existingClaim: x-likes
        globalMounts:
          - path: /data
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
