---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: calibre-web-automated
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      calibre-web-automated:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/crocodilestick/calibre-web-automated
              tag: v4.0.6
            env:
              CACHE_DIR: /cache
              TZ: ${TIMEZONE}
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 768Mi
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  initialDelaySeconds: 60
                  failureThreshold: 45
                  periodSeconds: 5
          nextcloud-sync:
            image:
              repository: rclone/rclone
              tag: 1.69.1
            command:
              - /bin/sh
              - -c
              - |
                export RCLONE_CONFIG_NC_TYPE=webdav
                export RCLONE_CONFIG_NC_URL="http://nextcloud.storage.svc.cluster.local:8080/remote.php/dav/files/${NEXTCLOUD_USERNAME}/"
                export RCLONE_CONFIG_NC_VENDOR=nextcloud
                export RCLONE_CONFIG_NC_USER="${NEXTCLOUD_USERNAME}"
                export RCLONE_CONFIG_NC_PASS=$(rclone obscure "${NEXTCLOUD_PASSWORD}")
                STATE_FILE="/config/.nc-sync-state"
                touch "$STATE_FILE"
                while true; do
                  echo "[$(date)] Checking Nextcloud Books..."
                  rclone lsf nc:Books/ --files-only 2>/dev/null | while IFS= read -r file; do
                    if ! grep -qxF "$file" "$STATE_FILE"; then
                      echo "[$(date)] Syncing: $file"
                      if rclone copy "nc:Books/${file}" /cwa-book-ingest/; then
                        echo "$file" >> "$STATE_FILE"
                        echo "[$(date)] Done: $file"
                      fi
                    fi
                  done
                  sleep 300
                done
            env:
              NEXTCLOUD_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: calibre-web-automated-nextcloud
                    key: NEXTCLOUD_USERNAME
              NEXTCLOUD_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: calibre-web-automated-nextcloud
                    key: NEXTCLOUD_PASSWORD
            resources:
              requests:
                cpu: 5m
                memory: 64Mi
              limits:
                memory: 128Mi
    service:
      app:
        controller: calibre-web-automated
        ports:
          http:
            port: &port 8083
    route:
      app:
        hostnames:
          - "books.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
          - name: external
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      config:
        existingClaim: calibre-web-automated
        globalMounts:
          - path: /config
      cache:
        type: emptyDir
      media:
        # type: nfs
        # server: 192.168.50.220
        # path: /volume4/media/calibre-web-automated
        # globalMounts:
        #   - path: /cwa-book-ingest
        #     subPath: cwa-book-ingest
        #   - path: /calibre-library
        #     subPath: calibre-library
        # enabled: true
        # accessMode: ReadWriteOnce
        # size: 10Gi
        # storageClass: nfs-ssd
        existingClaim: calibre-web-automated-nfs
        globalMounts:
          - path: /cwa-book-ingest
            subPath: cwa-book-ingest
          - path: /calibre-library
            subPath: calibre-library
