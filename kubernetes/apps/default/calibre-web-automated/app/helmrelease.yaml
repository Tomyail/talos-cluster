---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: calibre-web-automated
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      calibre-web-automated:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/crocodilestick/calibre-web-automated
              tag: v4.0.6
            env:
              CACHE_DIR: /cache
              TZ: ${TIMEZONE}
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 768Mi
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  initialDelaySeconds: 60
                  failureThreshold: 45
                  periodSeconds: 5
          nextcloud-sync:
            image:
              repository: rclone/rclone
              tag: 1.74.1
            command:
              - /bin/sh
              - -c
              - |
                mkdir -p /config/rclone
                cat > /config/rclone/rclone.conf <<RCLONEEOF
                [nc]
                type = webdav
                url = http://nextcloud.storage.svc.cluster.local:8080/remote.php/dav/files/$NEXTCLOUD_USERNAME/
                vendor = nextcloud
                user = $NEXTCLOUD_USERNAME
                pass = $(rclone obscure "$NEXTCLOUD_PASSWORD")
                RCLONEEOF
                STATE_FILE="/config/.nc-sync-state"
                touch "$STATE_FILE"
                while true; do
                  echo "[$(date)] Checking Nextcloud Books..."
                  rclone lsf nc:Books/ --recursive --files-only --ignore-case --include "*.{epub,pdf,mobi,azw3}" 2>&1 | while IFS= read -r file; do
                    if ! grep -qxF "$file" "$STATE_FILE"; then
                      echo "[$(date)] Syncing: $file"
                      if rclone copy "nc:Books/$file" /cwa-book-ingest/; then
                        echo "$file" >> "$STATE_FILE"
                        echo "[$(date)] Done: $file"
                      fi
                    fi
                  done
                  sleep 300
                done
            env:
              NEXTCLOUD_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: calibre-web-automated-nextcloud
                    key: NEXTCLOUD_USERNAME
              NEXTCLOUD_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: calibre-web-automated-nextcloud
                    key: NEXTCLOUD_PASSWORD
            resources:
              requests:
                cpu: 5m
                memory: 64Mi
              limits:
                memory: 128Mi
          books-export:
            image:
              repository: ghcr.io/crocodilestick/calibre-web-automated
              tag: v4.0.6
            command:
              - /bin/sh
              - -c
              - |
                python3 - <<'PY'
                import datetime
                import os
                import subprocess
                import time

                interval = int(os.environ.get("BOOKS_MAINTENANCE_INTERVAL_SECONDS", "3600"))
                while True:
                    now = datetime.datetime.now().isoformat(sep=' ', timespec='seconds')
                    print(f"[books-export] Starting maintenance at {now}", flush=True)
                    print("[books-export] Starting classification", flush=True)
                    classify = subprocess.run(["python3", "/scripts/classify-books.py"])
                    print(f"[books-export] Classification finished with exit code {classify.returncode}", flush=True)
                    print("[books-export] Starting export", flush=True)
                    result = subprocess.run(["python3", "/scripts/export-books.py"])
                    print(f"[books-export] Export finished with exit code {result.returncode}", flush=True)
                    print(f"[books-export] Sleeping {interval} seconds", flush=True)
                    time.sleep(interval)
                PY
            env:
              NEXTCLOUD_BASE_URL: http://nextcloud.storage.svc.cluster.local:8080
              NEXTCLOUD_EXPORT_DIR: Books-Exports
              OPENROUTER_MODEL: openrouter/free
              CLASSIFY_RECLASSIFY_ALL: "false"
              BOOKS_MAINTENANCE_INTERVAL_SECONDS: "3600"
              NEXTCLOUD_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: calibre-web-automated-nextcloud
                    key: NEXTCLOUD_USERNAME
              NEXTCLOUD_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: calibre-web-automated-nextcloud
                    key: NEXTCLOUD_PASSWORD
              OPENROUTER_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: calibre-web-automated-nextcloud
                    key: OPENROUTER_API_KEY
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 768Mi
    service:
      app:
        controller: calibre-web-automated
        ports:
          http:
            port: &port 8083
    route:
      app:
        hostnames:
          - "books.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
          - name: external
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      config:
        existingClaim: calibre-web-automated
        globalMounts:
          - path: /config
      cache:
        type: emptyDir
      media:
        # type: nfs
        # server: 192.168.50.220
        # path: /volume4/media/calibre-web-automated
        # globalMounts:
        #   - path: /cwa-book-ingest
        #     subPath: cwa-book-ingest
        #   - path: /calibre-library
        #     subPath: calibre-library
        # enabled: true
        # accessMode: ReadWriteOnce
        # size: 10Gi
        # storageClass: nfs-ssd
        existingClaim: calibre-web-automated-nfs
        globalMounts:
          - path: /cwa-book-ingest
            subPath: cwa-book-ingest
          - path: /calibre-library
            subPath: calibre-library
      export-script:
        type: configMap
        name: calibre-web-automated-export
        defaultMode: 0555
        advancedMounts:
          calibre-web-automated:
            books-export:
              - path: /scripts
                readOnly: true
