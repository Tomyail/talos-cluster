---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app linkwarden
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      linkwarden:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          install-playwright-browsers:
            image:
              repository: ghcr.io/linkwarden/linkwarden
              tag: v2.14.0@sha256:c5b9b4db571c468270cd916acebd5e6490b54393d90c1a2ccb9919a194ed7d51
            env:
              HOME: /data/config
              PLAYWRIGHT_BROWSERS_PATH: /data/config/.cache/ms-playwright
              YARN_CACHE_FOLDER: /tmp/.yarn-cache
              YARN_GLOBAL_FOLDER: /tmp/.yarn-global
              NPM_CONFIG_CACHE: /tmp/.npm
            command:
              - /bin/sh
              - -c
              - npx playwright install chromium
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.3
            envFrom: &envFrom
              - secretRef:
                  name: linkwarden-secret
        containers:
          app:
            image:
              repository: ghcr.io/linkwarden/linkwarden
              tag: v2.14.0@sha256:c5b9b4db571c468270cd916acebd5e6490b54393d90c1a2ccb9919a194ed7d51
            env:
              TZ: ${TIMEZONE}
              STORAGE_FOLDER: "config"
              HOME: /data/config
              # Yarn 环境变量 - 设置可写目录
              YARN_CACHE_FOLDER: /tmp/.yarn-cache
              YARN_GLOBAL_FOLDER: /tmp/.yarn-global
              NPM_CONFIG_CACHE: /tmp/.npm
              PLAYWRIGHT_BROWSERS_PATH: /data/config/.cache/ms-playwright
              NEXTAUTH_URL: https://linkwarden.${SECRET_DOMAIN}/api/v1/auth
              CUSTOM_OPENAI_BASE_URL: https://generativelanguage.googleapis.com/v1beta
              OPENAI_MODEL: gemini-2.5-flash
              NEXT_PUBLIC_DISABLE_REGISTRATION: "true"
              PLAYWRIGHT_WS_URL: ws://playwright.default.svc.cluster.local:3000
            envFrom: *envFrom
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 512Mi
              limits:
                memory: 2048Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        controller: *app
        ports:
          http:
            port: &port 3000
    route:
      app:
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
          - name: external
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      config:
        enabled: true
        existingClaim: *app
        globalMounts:
          - path: /data/config
      next-cache:
        type: emptyDir
        globalMounts:
          - path: /data/.next/cache
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
      cache:
        type: emptyDir
        globalMounts:
          - path: /data/apps/web/.next/cache
