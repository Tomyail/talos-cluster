apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: litellm
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
  target:
    name: litellm-secret
    template:
      engineVersion: v2
      data:
        LITELLM_MASTER_KEY: "{{ .LITELLM_MASTER_KEY }}"
        DATABASE_URL: "postgresql://{{ .LITELLM_POSTGRES_USER }}:{{ .LITELLM_POSTGRES_PASS }}@dev-postgres16-rw.database.svc.cluster.local:5432/litellm"
        INIT_POSTGRES_DBNAME: litellm
        INIT_POSTGRES_HOST: "dev-postgres16-rw.database.svc.cluster.local"
        INIT_POSTGRES_USER: "{{ .LITELLM_POSTGRES_USER }}"
        INIT_POSTGRES_PASS: "{{ .LITELLM_POSTGRES_PASS }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
        DEEPSEEK_API_KEY: "{{ .DEEPSEEK_API_KEY }}"
        GLM_API_KEY: "{{ .GLM_API_KEY }}"
        OPENROUTER_API_KEY: "{{ .OPENROUTER_API_KEY }}"
        EASYROUTER_API_KEY: "{{ .EASYROUTER_API_KEY }}"
  data:
    - secretKey: POSTGRES_SUPER_PASS
      remoteRef:
        key: cloudnative-pg
        property: password

    - secretKey: LITELLM_MASTER_KEY
      remoteRef:
        key: CLAUDE_LITELLM
        property: password

    - secretKey: LITELLM_POSTGRES_USER
      remoteRef:
        key: litellm-db
        property: username
    - secretKey: LITELLM_POSTGRES_PASS
      remoteRef:
        key: litellm-db
        property: password

    - secretKey: DEEPSEEK_API_KEY
      remoteRef:
        key: CLAUDE_DEEPSEEK
        property: password
    - secretKey: GLM_API_KEY
      remoteRef:
        key: CLAUDE_GLM
        property: password
    - secretKey: OPENROUTER_API_KEY
      remoteRef:
        key: OPENROUTER_API_KEY
        property: password
    - secretKey: EASYROUTER_API_KEY
      remoteRef:
        key: CLAUDE_EASYROUTER
        property: password
