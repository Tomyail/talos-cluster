---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - externalsecret.yaml
  - helmrelease.yaml
configMapGenerator:
  - name: openclaw-config
    files:
      - migrate-config.js=./config/migrate-config.js
  # A fixed name lets Reloader restart the Deployment when these projected
  # files change; OpenClaw's watcher does not observe include-file changes.
  - name: openclaw-managed-config
    files:
      - agent-feishu-tools.json5=./config/managed/agent-feishu-tools.json5
      - agents.json5=./config/managed/agents.json5
      - bindings.json5=./config/managed/bindings.json5
      - gateway.json5=./config/managed/gateway.json5
      - models.json5=./config/managed/models.json5
      - tools.json5=./config/managed/tools.json5
generatorOptions:
  disableNameSuffixHash: true
