---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openclaw
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      openclaw:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
        initContainers:
          init-config:
            image:
              repository: ghcr.io/openclaw/openclaw
              tag: 2026.6.11@sha256:3814fb1f62f9cfc5944de088c5817c68c88b5d721feebe36420b666a90a61ce7
            command:
              - sh
              - -c
            args:
              - |
                set -e
                mkdir -p /home/node/.openclaw /home/node/.local/bin /home/node/.local/go

                if [ ! -f /home/node/.openclaw/openclaw.json ]; then
                  echo '{"gateway":{"mode":"local"}}' > /home/node/.openclaw/openclaw.json
                fi
                node <<'NODE'
                const fs = require("fs");
                const path = "/home/node/.openclaw/openclaw.json";
                const config = JSON.parse(fs.readFileSync(path));
                const isGemini = (model) =>
                  typeof model === "string" && model.startsWith("google/gemini");
                const removeGemini = (modelConfig) => {
                  if (!modelConfig || typeof modelConfig !== "object") return;

                  modelConfig.fallbacks = (modelConfig.fallbacks || []).filter(
                    (model) => !isGemini(model),
                  );
                  if (isGemini(modelConfig.primary)) {
                    modelConfig.primary = modelConfig.fallbacks.shift();
                  }
                  if (!modelConfig.primary) delete modelConfig.primary;
                  if (modelConfig.fallbacks.length === 0) delete modelConfig.fallbacks;
                };

                config.gateway ||= {};
                config.gateway.trustedProxies = ["192.168.50.145/32"];
                config.gateway.controlUi ||= {};
                config.gateway.controlUi.allowedOrigins = [
                  "https://openclaw.${SECRET_DOMAIN}",
                ];
                delete config.gateway.controlUi.dangerouslyAllowHostHeaderOriginFallback;

                if (config.tools?.web?.fetch) {
                  delete config.tools.web.fetch.provider;
                  delete config.tools.web.fetch.apiKey;
                }
                if (config.tools?.web?.search) {
                  delete config.tools.web.search.provider;
                  delete config.tools.web.search.apiKey;
                }

                config.models ||= {};
                config.models.providers ||= {};
                if (config.models.providers.litellm) {
                  config.models.providers.litellm.apiKey = {
                    source: "env",
                    provider: "default",
                    id: "LITELLM_AUTH_TOKEN",
                  };
                }
                delete config.models.providers.google;

                const defaults = config.agents?.defaults;
                if (defaults?.models) {
                  const deprecated = [
                    "openai-codex/gpt-5.2",
                    "openai-codex/gpt-5.1",
                    "openai-codex/gpt-5.2-codex",
                  ];
                  let migratedModel = null;
                  for (const model of deprecated) {
                    if (defaults.models[model]) {
                      migratedModel ||= defaults.models[model];
                      delete defaults.models[model];
                    }
                  }
                  if (migratedModel && !defaults.models["openai/gpt-5.5"]) {
                    defaults.models["openai/gpt-5.5"] = migratedModel;
                  }
                  for (const model of Object.keys(defaults.models)) {
                    if (isGemini(model)) delete defaults.models[model];
                  }
                }
                removeGemini(defaults?.model);
                if (defaults?.imageGenerationModel) {
                  removeGemini(defaults.imageGenerationModel);
                  if (!defaults.imageGenerationModel.primary) {
                    delete defaults.imageGenerationModel;
                  }
                }
                for (const agent of config.agents?.list || []) {
                  removeGemini(agent.model);
                }

                if (config.tools?.media?.audio?.models) {
                  config.tools.media.audio.models = config.tools.media.audio.models.filter(
                    ({ provider, model }) =>
                      provider !== "google" && !String(model).startsWith("gemini"),
                  );
                  if (config.tools.media.audio.models.length === 0) {
                    config.tools.media.audio.enabled = false;
                    delete config.tools.media.audio.models;
                  }
                }

                fs.writeFileSync(path, JSON.stringify(config, null, 2));
                NODE

                export PATH=/home/node/.local/bin:/home/node/.local/go/bin:$PATH

                # Install gh CLI if not present on PVC
                if [ ! -f /home/node/.local/bin/gh ]; then
                  echo "Installing gh CLI..."
                  cd /tmp
                  curl -fsSL https://github.com/cli/cli/releases/download/v2.61.0/gh_2.61.0_linux_amd64.tar.gz -o gh.tar.gz
                  tar xzf gh.tar.gz
                  cp gh_2.61.0_linux_amd64/bin/gh /home/node/.local/bin/
                  rm -rf gh.tar.gz gh_2.61.0_linux_amd64
                fi

                # Install Go if not present on PVC
                # Skipping go installation due to download issues

                # Install Homebrew if not present on PVC
                if [ ! -f /home/node/.local/homebrew/bin/brew ]; then
                  echo "Installing Homebrew..."
                  export HOMEBREW_PREFIX=/home/node/.local/homebrew
                  export HOMEBREW_CELLAR=/home/node/.local/homebrew/Cellar
                  export HOMEBREW_REPOSITORY=/home/node/.local/homebrew
                  mkdir -p $HOMEBREW_PREFIX
                  cd /tmp
                  git clone --depth 1 https://github.com/Homebrew/brew $HOMEBREW_PREFIX
                fi

                # Check if pip is available
                set +e
                if command -v pip3 >/dev/null 2>&1 || command -v pip >/dev/null 2>&1 || python3 -m pip --version >/dev/null 2>&1; then
                  echo "pip is available"
                else
                  echo "Installing pip..."
                  cd /tmp
                  curl -fsSL https://bootstrap.pypa.io/get-pip.py -o get-pip.py
                  python3 get-pip.py --user --no-warn-script-location --break-system-packages || \
                  python3 get-pip.py --user --no-warn-script-location || \
                  echo "pip install skipped (use python3 -m pip instead)"
                  rm -f get-pip.py
                fi
                set -e
                echo "Init container completed successfully"
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 1000
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: "1"
                memory: 1Gi

        containers:
          app:
            securityContext:
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            env:
              TZ: Asia/Shanghai
              LANG: C.UTF-8
              LC_ALL: C.UTF-8
              HOME: /home/node
              HOMEBREW_CELLAR: /home/node/.local/homebrew/Cellar
              HOMEBREW_PREFIX: /home/node/.local/homebrew
              HOMEBREW_REPOSITORY: /home/node/.local/homebrew
              GOPATH: /home/node/go
              npm_config_prefix: /home/node/.npm-global
              PIP_BREAK_SYSTEM_PACKAGES: "1"
              PATH: /home/node/.local/bin:/home/node/.local/go/bin:/home/node/.local/homebrew/bin:/home/node/.npm-global/bin:/root/.bun/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            envFrom:
              - secretRef:
                  name: openclaw-secret
            image:
              repository: ghcr.io/openclaw/openclaw
              tag: 2026.6.11@sha256:3814fb1f62f9cfc5944de088c5817c68c88b5d721feebe36420b666a90a61ce7
            command:
              - node
            args:
              - dist/index.js
              - gateway
              - --bind
              - lan
              - --port
              - "18789"
              - --allow-unconfigured
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - node
                      - -e
                      - "require('http').get('http://127.0.0.1:18789/healthz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  timeoutSeconds: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - node
                      - -e
                      - "require('http').get('http://127.0.0.1:18789/readyz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  timeoutSeconds: 5
            resources:
              requests:
                cpu: 10m
                memory: 512Mi
              limits:
                memory: 4Gi
    persistence:
      config:
        existingClaim: openclaw
        globalMounts:
          - path: /home/node
      # npx-cache:
      #   type: emptyDir
      #   advancedMounts:
      #     openclaw:
      #       app:
      #         - path: /home/node/.npm/_npx
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
    service:
      app:
        controller: openclaw
        ports:
          http:
            port: 18789
    route:
      app:
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: 18789
