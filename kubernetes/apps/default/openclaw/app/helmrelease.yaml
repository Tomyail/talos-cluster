---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openclaw
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      openclaw:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
        initContainers:
          init-config:
            image:
              repository: ghcr.io/openclaw/openclaw
              tag: 2026.7.1@sha256:6a31d44b2944e7adcd2b582bf6fb463111264ebca97a0201795b799135bd102c
            command:
              - sh
              - -c
            args:
              - |
                set -e
                mkdir -p /home/node/.openclaw /home/node/.local/bin /home/node/.local/go

                if [ ! -f /home/node/.openclaw/openclaw.json ]; then
                  echo '{"gateway":{"mode":"local"}}' > /home/node/.openclaw/openclaw.json
                fi
                node /etc/openclaw/migrate-config.js /home/node/.openclaw/openclaw.json

                export PATH=/home/node/.local/bin:/home/node/.local/go/bin:$PATH

                # Install gh CLI if not present on PVC
                if [ ! -f /home/node/.local/bin/gh ]; then
                  echo "Installing gh CLI..."
                  cd /tmp
                  curl -fsSL https://github.com/cli/cli/releases/download/v2.61.0/gh_2.61.0_linux_amd64.tar.gz -o gh.tar.gz
                  tar xzf gh.tar.gz
                  cp gh_2.61.0_linux_amd64/bin/gh /home/node/.local/bin/
                  rm -rf gh.tar.gz gh_2.61.0_linux_amd64
                fi

                # Install Go if not present on PVC
                # Skipping go installation due to download issues

                # Install Homebrew if not present on PVC
                if [ ! -f /home/node/.local/homebrew/bin/brew ]; then
                  echo "Installing Homebrew..."
                  export HOMEBREW_PREFIX=/home/node/.local/homebrew
                  export HOMEBREW_CELLAR=/home/node/.local/homebrew/Cellar
                  export HOMEBREW_REPOSITORY=/home/node/.local/homebrew
                  mkdir -p $HOMEBREW_PREFIX
                  cd /tmp
                  git clone --depth 1 https://github.com/Homebrew/brew $HOMEBREW_PREFIX
                fi

                # Check if pip is available
                set +e
                if command -v pip3 >/dev/null 2>&1 || command -v pip >/dev/null 2>&1 || python3 -m pip --version >/dev/null 2>&1; then
                  echo "pip is available"
                else
                  echo "Installing pip..."
                  cd /tmp
                  curl -fsSL https://bootstrap.pypa.io/get-pip.py -o get-pip.py
                  python3 get-pip.py --user --no-warn-script-location --break-system-packages || \
                  python3 get-pip.py --user --no-warn-script-location || \
                  echo "pip install skipped (use python3 -m pip instead)"
                  rm -f get-pip.py
                fi
                set -e
                echo "Init container completed successfully"
            env:
              OPENCLAW_INCLUDE_ROOTS: /etc/openclaw/managed
              OPENCLAW_MANAGED_GATEWAY_PATH: /etc/openclaw/managed/gateway.json5
              OPENCLAW_MANAGED_MODELS_PATH: /etc/openclaw/managed/models.json5
              OPENCLAW_MANAGED_TOOLS_PATH: /etc/openclaw/managed/tools.json5
              OPENCLAW_TARGET_MODEL: litellm/coding
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 1000
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: "1"
                memory: 1Gi

        containers:
          app:
            securityContext:
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            env:
              TZ: Asia/Shanghai
              LANG: C.UTF-8
              LC_ALL: C.UTF-8
              HOME: /home/node
              HOMEBREW_CELLAR: /home/node/.local/homebrew/Cellar
              HOMEBREW_PREFIX: /home/node/.local/homebrew
              HOMEBREW_REPOSITORY: /home/node/.local/homebrew
              GOPATH: /home/node/go
              npm_config_prefix: /home/node/.npm-global
              PIP_BREAK_SYSTEM_PACKAGES: "1"
              OPENCLAW_INCLUDE_ROOTS: /etc/openclaw/managed
              PATH: /home/node/.local/bin:/home/node/.local/go/bin:/home/node/.local/homebrew/bin:/home/node/.npm-global/bin:/root/.bun/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            envFrom:
              - secretRef:
                  name: openclaw-secret
            image:
              repository: ghcr.io/openclaw/openclaw
              tag: 2026.7.1@sha256:6a31d44b2944e7adcd2b582bf6fb463111264ebca97a0201795b799135bd102c
            command:
              - node
            args:
              - dist/index.js
              - gateway
              - --allow-unconfigured
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - node
                      - -e
                      - "require('http').get('http://127.0.0.1:18789/healthz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  timeoutSeconds: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - node
                      - -e
                      - "require('http').get('http://127.0.0.1:18789/readyz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  timeoutSeconds: 5
            resources:
              requests:
                cpu: 10m
                memory: 512Mi
              limits:
                memory: 4Gi
    persistence:
      config:
        existingClaim: openclaw
        globalMounts:
          - path: /home/node
      config-migration:
        type: configMap
        name: openclaw-config
        advancedMounts:
          openclaw:
            init-config:
              - path: /etc/openclaw/migrate-config.js
                subPath: migrate-config.js
                readOnly: true
      managed-config:
        type: configMap
        name: openclaw-managed-config
        advancedMounts:
          openclaw:
            init-config:
              - path: /etc/openclaw/managed
                readOnly: true
            app:
              - path: /etc/openclaw/managed
                readOnly: true
      # npx-cache:
      #   type: emptyDir
      #   advancedMounts:
      #     openclaw:
      #       app:
      #         - path: /home/node/.npm/_npx
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
    service:
      app:
        controller: openclaw
        ports:
          http:
            port: 18789
    route:
      app:
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: 18789
