---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ${APP}-registry
  namespace: ${NAMESPACE}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
  target:
    name: ${APP}-registry-secret
    template:
      type: kubernetes.io/dockerconfigjson
      engineVersion: v2
      data:
        .dockerconfigjson: '{"auths":{"${REGISTRY_HOST}":{"username":"{{ .REGISTRY_USERNAME }}","password":"{{ .REGISTRY_PASSWORD }}","auth":"{{ printf "%s:%s" .REGISTRY_USERNAME .REGISTRY_PASSWORD | b64enc }}"}}}'
  data:
    - secretKey: REGISTRY_USERNAME
      remoteRef:
        key: ${BW_ID}
        property: username
    - secretKey: REGISTRY_PASSWORD
      remoteRef:
        key: ${BW_ID}
        property: password
