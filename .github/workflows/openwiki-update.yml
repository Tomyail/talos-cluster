name: OpenWiki Update

on:
  workflow_dispatch:
  schedule:
    # UTC 19:30 = 北京 03:30 (凌晨3点之后, 错开 yt-audio/mobile 的 03:00)
    - cron: "30 19 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install OpenWiki
        run: npm install --global openwiki

      - name: Run OpenWiki
        run: openwiki code --update --print
        env:
          OPENWIKI_PROVIDER: anthropic
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: https://open.bigmodel.cn/api/anthropic
          OPENWIKI_MODEL_ID: glm-4.7

      - name: Commit & push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add openwiki AGENTS.md CLAUDE.md
          if git diff --staged --quiet; then
            echo "No OpenWiki changes to commit"
          else
            git commit -m "docs: update OpenWiki"
            git push
          fi
